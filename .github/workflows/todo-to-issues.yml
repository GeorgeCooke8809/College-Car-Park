name: TODO to GitHub Issues

on:
  push:
    branches:
      - development

jobs:
  todo_scan:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed to diff previous commit

      - name: Get new TODOs
        id: todos
        run: |
          git diff HEAD~1 HEAD \
            | grep '^+' \
            | grep 'TODO(issue):' \
            | sed 's/^+//' \
            > todos.txt || true

      - name: Create GitHub issues
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          while read -r line; do
            TITLE=$(echo "$line" | sed 's/.*TODO(issue): *//')
            gh issue create \
              --title "$TITLE" \
              --body "$line"
          done < todos.txt
