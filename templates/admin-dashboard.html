        <nav class="side-bar-list">

        <section class="container">
            <div id="dashboard-mini-settings">
                <form id="date-select-divider" method="post">
                    <input type="image" name="backDate" src="static/img/date_back.png" alt="submit" id="date_back" class="switch-date-button"> <!-- TODO: Add functionality to change date buttons -->

                    <p id="current_date">{{ current_date }}</p>

                    <input type="image" name="forwardDate" src="static/img/date_forward.png" alt="submit" id="date_forward" class="switch-date-button"> <!-- TODO: Add functionality to change date buttons -->
                </form>

                <div id="spaces-avail-display">
                    <form id="spaces-in-use-form" method="post">
                        <input type="number" name="newSpaces" id="edit_spaces_avail_entry">
                        <input type="submit" name="submitNewSpaces" id="submit-spaces_avail_entry" class="submit-button"> <!-- TODO: Add functionality to update spaces-->
                    </form>

                    <p id="spaces-text">{{current_spaces}}/{{maximum_spaces}} Spaces In Use</p>

                    <button class="edit-button" onclick=showEditSpaces()>
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h357l-80 80H200v560h560v-278l80-80v358q0 33-23.5 56.5T760-120H200Zm280-360ZM360-360v-170l367-367q12-12 27-18t30-6q16 0 30.5 6t26.5 18l56 57q11 12 17 26.5t6 29.5q0 15-5.5 29.5T897-728L530-360H360Zm481-424-56-56 56 56ZM440-440h56l232-232-28-28-29-28-231 231v57Zm260-260-29-28 29 28 28 28-28-28Z"/></svg>
                    </button> <!-- TODO: Implement functionality to show / hide edit spaces button, will require editing CSS with JSS -->

                    <button class="close-button" onclick=hideEditSpaces()>
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="m256-168-88-88 224-224-224-224 88-88 224 224 224-224 88 88-224 224 224 224-88 88-224-224-224 224Z"/></svg>                    
                    </button> <!-- TODO: Implement functionality to show / hide edit spaces button, will require editing CSS with JSS -->
                </div>
            </div>

            <div id="dashboard-current-bookings">
                {% for booking in bookings %}
                    <div class="booking-box">
                        <a href="./admin-view-user?uid={{booking[0]}}" class="booking-link">
                            <h1>{{booking[1]}}</h1>
                            <h3>{{booking[2]}}</h3>
                        </a>
                    </div>
                {% endfor %}
            </div>
        </section>

        <footer id="main-footer">
            <hr>
            <small>Copyright &copy; 2026 by George Cooke</small>
        </footer>
    </body>
