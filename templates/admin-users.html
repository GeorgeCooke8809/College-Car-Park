                        <!-- SIDE BAR

        <nav class="side-bar-list">
            <ul class="side-bar-navigation-list">
                <li><a href="#" class="nav-button-current">Home</a></li>

        <section class="container">
            <button id="add-user-button"> <!-- TODO: Add functionality to add user button -->
                <div id="add-user-border">
                    <div id="add-user-centred">
                        <svg xmlns="http://www.w3.org/2000/svg" height="50px" viewBox="0 -960 960 960" width="50px" fill="#4a4a4a"><path d="M417-417H166v-126h251v-251h126v251h251v126H543v251H417v-251Z"/></svg>
                        <p>ADD USER</p>
                    </div>
                </div>
            </button>

           <div id="user-list">
                {% for user in users: %}
                    <a class="user-link" href="/admin-view-user?uid={{ user[0] }}">
                        <div class="user-border">
                            <p class="user-name">
                                {{ user[1] }} {{ user[2] }}
                            </p>

                            <div class="user-details-divider">
                                <p class="user-type">{{ user[3] }}</p>

                                <div class="user-booking-string-divider">
                                    <p class="user-booking-string-header">Next Booking: </p>
                                    
                                    {% if user[-1][-1] == ")": %}
                                        <p class="user-booking-string-active">{{ user[-1] }}</p>
                                    {% else: %}
                                        <p class="user-booking-string-inactive">{{ user[-1] }}</p>
                                    {% endif %}
                                </div>
                            </div>
                        </div>
                    </a>
                {% endfor %}
           </div>
        </section>

        <footer id="main-footer">
            <hr>
            <small>Copyright &copy; 2026 by George Cooke</small>
        </footer>
    </body>
</html>
